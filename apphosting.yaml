# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Standard resource allocation for Next.js builds with PWA and Genkit
  maxInstances: 2
  memory: 1024Mi
  cpu: 1
  concurrency: 80

env:
  - variable: NEXT_TELEMETRY_DISABLED
    value: "1"
  - variable: TZ
    value: "Asia/Manila"
